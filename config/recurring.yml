weather_ingestion:
  class: WeatherIngestionCycleJob
  queue: weather_ingestion
  schedule: every hour

alarm_evaluation:
  class: AlarmEvaluationJob
  args: ["all"]
  schedule: every 5 minutes

sensor_readings_partitions:
  class: SensorReadingPartitionsJob
  schedule: every day at 3:00

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
