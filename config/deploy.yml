# Name of your application. Used to uniquely configure containers.
service: naila

# Name of the container image. Replace <DOCKERHUB_USERNAME> with the Docker Hub
# account that owns the naila repository.
image: <DOCKERHUB_USERNAME>/naila

# Deploy to these servers. Replace <HETZNER_PUBLIC_IP> with the public IPv4 of
# the Hetzner Cloud server.
servers:
  web:
    - <HETZNER_PUBLIC_IP>

# SSL termination by the kamal-proxy. Requires DNS for nailariscos.com to point
# at the server above. force_ssl is enabled in production.rb.
proxy:
  ssl: true
  host: nailariscos.com

# Container registry — Docker Hub.
registry:
  server: docker.io
  username: <DOCKERHUB_USERNAME>
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - NAILA_DATABASE_PASSWORD
  clear:
    # Run the Solid Queue Supervisor inside the web server's Puma process.
    SOLID_QUEUE_IN_PUMA: true
    JOB_CONCURRENCY: 1
    WEB_CONCURRENCY: 2
    # Database server hostname — points at the Postgres accessory below via the
    # local kamal docker network.
    DB_HOST: naila-db

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
# "bin/kamal logs -r job" will tail logs from the first server in the job section.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Use a persistent storage volume for ActiveStorage local files.
volumes:
  - "naila_storage:/rails/storage"

# Bridge fingerprinted assets between versions to avoid 404s on in-flight
# requests during rollout.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

# Postgres + PostGIS accessory. The image ships with PostGIS preinstalled, so
# no manual `CREATE EXTENSION` step is required.
accessories:
  db:
    image: postgis/postgis:17-3.5
    host: <HETZNER_PUBLIC_IP>
    # Bind to localhost only — never expose Postgres on the public IP.
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: naila
        POSTGRES_DB: naila_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
