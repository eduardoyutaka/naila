open_meteo_current:
  source: "open_meteo"
  issued_at: <%= 30.minutes.ago.iso8601 %>
  valid_from: <%= 1.hour.ago.iso8601 %>
  valid_until: <%= 2.hours.from_now.iso8601 %>
  precipitation_mm: 15.0
  precipitation_probability: 80.0
  temperature_max_c: 22.0
  temperature_min_c: 18.0
  raw_data: '{"soil_moisture_avg": 0.35}'

open_meteo_future:
