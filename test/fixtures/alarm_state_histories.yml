river_to_alarm:
  alarm: river_level_belem
  previous_state: ok
  new_state: alarm
  reason: "2 of 3 evaluation periods breached threshold 1.5m (values: [1.8, 1.6, 1.3])"
  datapoints: '[{"period":1,"value":1.8,"breaching":true},{"period":2,"value":1.6,"breaching":true},{"period":3,"value":1.3,"breaching":false}]'
  evaluated_at: <%= 30.minutes.ago.iso8601 %>

precip_alarm_to_ok:
  alarm: precip_3h_belem
  previous_state: alarm
  new_state: ok
  reason: "0 of 3 evaluation periods breached threshold 40.0mm"
  datapoints: '[{"period":1,"value":12.3,"breaching":false},{"period":2,"value":8.1,"breaching":false},{"period":3,"value":5.0,"breaching":false}]'
  evaluated_at: <%= 1.hour.ago.iso8601 %>
