websocket_sent:
  alert: active_high
  channel: websocket
  status: sent
  sent_at: <%= 2.hours.ago.iso8601 %>

sms_pending:
  alert: active_high
  channel: sms
  status: pending
  recipient: "+5541999000001"

email_failed:
  alert: acknowledged_alert
  channel: email
  status: failed
  failure_reason: "SMTP connection timeout"
