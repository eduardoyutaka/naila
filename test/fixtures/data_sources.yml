open_meteo:
  name: "Open-Meteo"
  source_type: "api"
  base_url: "https://api.open-meteo.com"
  fetch_interval_seconds: 1800
  status: "active"
  consecutive_failures: 0
  last_successful_fetch_at: <%= 2.hours.ago.iso8601 %>

open_weather_map:
  name: "OpenWeatherMap"
