precip_3h_belem:
  name: Precipitação 3h Bacia Belém
  description: Alarme de precipitação acumulada em 3 horas
  alarm_type: metric
  state: ok
  state_changed_at: <%= 1.hour.ago.iso8601 %>
  state_reason: "0 of 3 evaluation periods breached threshold"
  severity: 2
  enabled: true
  river_basin: bacia_belem
  metric_name: precipitation_3h
  statistic: Sum
  period_seconds: 3600
  evaluation_periods: 3
  datapoints_to_alarm: 2
  comparison_operator: GreaterThanOrEqualToThreshold
  threshold_value: 40.0
  unit: mm
  missing_data_treatment: missing
  last_evaluated_at: <%= 10.minutes.ago.iso8601 %>
  last_datapoints: '[{"period":1,"value":12.3,"breaching":false},{"period":2,"value":8.1,"breaching":false},{"period":3,"value":5.0,"breaching":false}]'

river_level_belem:
  name: Nível Rio Belém
  description: Alarme de nível do rio Belém
  alarm_type: metric
  state: alarm
  state_changed_at: <%= 30.minutes.ago.iso8601 %>
  state_reason: "2 of 3 evaluation periods breached threshold 1.5m"
  severity: 3
  enabled: true
  river_basin: bacia_belem
  river: belem
  metric_name: river_level
  statistic: Maximum
  period_seconds: 300
  evaluation_periods: 3
  datapoints_to_alarm: 2
  comparison_operator: GreaterThanOrEqualToThreshold
  threshold_value: 1.5
  unit: m
  missing_data_treatment: missing
  last_evaluated_at: <%= 5.minutes.ago.iso8601 %>
  last_datapoints: '[{"period":1,"value":1.8,"breaching":true},{"period":2,"value":1.6,"breaching":true},{"period":3,"value":1.3,"breaching":false}]'

anomaly_precip_belem:
  name: Anomalia Precipitação Belém
  description: Detecção de anomalia na precipitação
  alarm_type: anomaly_detection
  state: insufficient_data
  severity: 2
  enabled: true
  river_basin: bacia_belem
  metric_name: precipitation_1h
  statistic: Sum
  period_seconds: 3600
  evaluation_periods: 3
  datapoints_to_alarm: 2
  comparison_operator: GreaterThanOrEqualToThreshold
  missing_data_treatment: missing
  anomaly_band_width: 2.0
  anomaly_baseline: precipitation_belem

composite_flood_belem:
  name: Risco de Enchente Belém
  description: Alarme composto de risco de enchente
  alarm_type: composite
  state: ok
  state_changed_at: <%= 1.hour.ago.iso8601 %>
  state_reason: "Composite rule evaluated to false"
  severity: 4
  enabled: true
  river_basin: bacia_belem
  composite_rule: "ALARM(Precipitação 3h Bacia Belém) AND ALARM(Nível Rio Belém)"
  suppress_child_actions: true

disabled_alarm:
  name: Alarme Desativado
  description: Alarme desativado para teste
  alarm_type: metric
  state: insufficient_data
  severity: 1
  enabled: false
  metric_name: precipitation_1h
  statistic: Sum
  period_seconds: 3600
  evaluation_periods: 1
  datapoints_to_alarm: 1
  comparison_operator: GreaterThanThreshold
  threshold_value: 10.0
  unit: mm
  missing_data_treatment: notBreaching
