    channels:
      - websocket
  enabled: true

composite_alarm_civil_defense:
  alarm: composite_flood_belem
  trigger_state: alarm
  action_type: notification
  configuration:
    channels:
      - websocket
      - sms
      - push
      - email
      - civil_defense
