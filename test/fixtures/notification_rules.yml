  description: Email direto para um operador sem depender do cargo.
  channel: email
  min_severity: 2
  target_admins: false
  target_coordinators: false
  target_operators: false
  enabled: true

sms_all_roles_high:
  name: SMS Todos - Alerta Máximo
  description: SMS para todos os cargos a partir de Alerta Máximo.
  channel: sms
  min_severity: 3
  target_admins: true
  target_coordinators: true
  target_operators: true
  enabled: true

disabled_rule:
  name: Regra Desativada
  channel: email
  min_severity: 1
