  description: Email para todos os administradores quando um alarme atingir nível de alerta ou superior.
  channel: email
  min_severity: 2
  target_admins: true
  target_coordinators: false
  target_operators: false
  enabled: true

sms_coordinators_emergency:
  name: SMS Coordenadores - Emergência
  description: SMS para coordenadores em situações de emergência.
  channel: sms
  min_severity: 4
  target_admins: false
  target_coordinators: true
  target_operators: false
  enabled: true

email_specific_user:
