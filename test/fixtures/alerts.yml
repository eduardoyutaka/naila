active_high:
  title: Risco de transbordamento no Rio Belém
  description: Nível do Rio Belém acima do limiar de alerta máximo.
  instructions: Evacuar áreas ribeirinhas do bairro Centro.
  severity: 3
  alert_type: automatic
  status: active
  risk_zone: zona_centro
  neighborhood: centro
  river: belem
  activated_at: <%= 2.hours.ago.iso8601 %>
  created_at: <%= 2.hours.ago.iso8601 %>
  updated_at: <%= 2.hours.ago.iso8601 %>

active_attention:
  title: Precipitação acima da média no bairro Batel
  description: Acúmulo pluviométrico de 40mm nas últimas 3 horas.
  severity: 1
  alert_type: automatic
  status: active
  neighborhood: batel
  activated_at: <%= 1.hour.ago.iso8601 %>
  created_at: <%= 1.hour.ago.iso8601 %>
  updated_at: <%= 1.hour.ago.iso8601 %>

acknowledged_alert:
  title: Alagamento na região central
  description: Relatos de alagamento na Rua XV de Novembro.
  instructions: Evitar deslocamento pela região.
  severity: 2
  alert_type: manual
  status: acknowledged
  risk_zone: zona_centro
  neighborhood: centro
  created_by: coordinator
  acknowledged_at: <%= 30.minutes.ago.iso8601 %>
  activated_at: <%= 1.hour.ago.iso8601 %>
  created_at: <%= 1.hour.ago.iso8601 %>
  updated_at: <%= 30.minutes.ago.iso8601 %>

resolved_alert:
  title: Nível do Rio Belém normalizado
  description: O nível do rio retornou aos valores normais.
  severity: 2
  alert_type: automatic
  status: resolved
  risk_zone: zona_centro
  river: belem
  resolved_by: admin
  resolved_at: <%= 1.day.ago.iso8601 %>
  activated_at: <%= 2.days.ago.iso8601 %>
  created_at: <%= 2.days.ago.iso8601 %>
  updated_at: <%= 1.day.ago.iso8601 %>
